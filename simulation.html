<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Compiler Feed | Sai Naveen</title>
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --border: #262626;
            --insta-blue: #0095f6;
            --text: #fafafa;
            --muted: #8e8e8e;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, sans-serif;
            margin: 0;
        }
        nav {
            border-bottom: 1px solid var(--border);
            padding: 10px 0;
            text-align: center;
            font-weight: 700;
            font-size: 20px;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
        }
        .main-wrapper {
            max-width: 935px;
            margin: 30px auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }
        .post-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        .post-header {
            padding: 14px;
            display: flex;
            align-items: center;
            font-weight: 600;
            font-size: 14px;
        }
        .mini-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09433, #bc1888);
            margin-right: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 10px;
        }
        textarea {
            width: 100%;
            height: 400px;
            background: #000;
            color: #00ff00;
            border: none;
            padding: 20px;
            font-family: 'Courier New', monospace;
            resize: none;
            outline: none;
        }
        .post-actions {
            padding: 12px;
            border-top: 1px solid var(--border);
        }
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .output-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            font-size: 13px;
        }
        .tab-btn {
            background: var(--insta-blue);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        .token { color: #0095f6; font-weight: bold; }
        .optimized { color: #00f2ff; font-style: italic; }
    </style>
</head>
<body>

<nav>CompilerGram</nav>

<div class="main-wrapper">
    <div class="post-card">
        <div class="post-header">
            <div class="mini-avatar">SN</div>
            sai_naveen • RA2311003050059
        </div>
        <textarea id="editor">int main() {
    int a = 10 + 5;
    int b = a * 1;
    return b;
}</textarea>
        <div class="post-actions">
            <button class="tab-btn" onclick="process()">Compile & Optimize</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="output-box">
            <strong style="color:var(--muted)">LEXICAL ANALYSIS</strong>
            <div id="lexer-out" style="margin-top:10px; line-height:1.8;">Run compiler to see tokens...</div>
        </div>
        <div class="output-box">
            <strong style="color:var(--muted)">OPTIMIZATION LOGS</strong>
            <div id="opt-out" style="margin-top:10px;">Waiting for input...</div>
        </div>
    </div>
</div>

<script>
    function process() {
        const code = document.getElementById('editor').value;
        
        // Lexer Simulation
        const tokens = code.match(/\w+|[+*={};()]/g);
        document.getElementById('lexer-out').innerHTML = tokens.map(t => `<span class="token">${t}</span>`).join(' ');

        // Optimization Simulation
        let logs = "<ul>";
        if(code.includes("10 + 5")) logs += "<li>✅ Constant Folded: 10+5 -> 15</li>";
        if(code.includes("* 1")) logs += "<li>✅ Algebraic Simp: x*1 -> x</li>";
        logs += "<li>✅ Code generation complete for RA2311003050059</li></ul>";
        
        document.getElementById('opt-out').innerHTML = logs;
    }
</script>

</body>
</html>
