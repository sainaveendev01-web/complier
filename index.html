<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Sai Naveen | Compiler Lab</title>
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --border: #262626;
            --insta-blue: #0095f6;
            --insta-grad: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            --text: #fafafa;
            --secondary-text: #8e8e8e;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .profile-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--border);
            padding: 40px 20px;
            border-radius: 12px;
            background: var(--card);
        }
        .story-ring {
            width: 100px;
            height: 100px;
            background: var(--insta-grad);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3px;
        }
        .profile-pic {
            background: var(--bg);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
        }
        h1 { font-size: 24px; font-weight: 600; margin: 10px 0; }
        .reg-number { color: var(--secondary-text); font-size: 16px; margin-bottom: 25px; }
        .bio { font-size: 14px; margin-bottom: 30px; line-height: 1.5; color: var(--text); }
        .btn-insta {
            background-color: var(--insta-blue);
            color: white;
            text-decoration: none;
            padding: 10px 30px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            display: inline-block;
            transition: opacity 0.3s;
        }
        .btn-insta:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="story-ring">
            <div class="profile-pic">SN</div>
        </div>
        <h1>sai_naveen</h1>
        <div class="reg-number">RA2311003050059</div>
        <p class="bio">
            <b>Compiler Design Portfolio</b><br>
            Simulation of Lexical, Syntax, and Optimization phases.<br>
            Full pipeline execution enabled. 🚀
        </p>
        <a href="simulation.html" class="btn-insta">Open Compiler Engine</a>
    </div>
</body>
</html>
