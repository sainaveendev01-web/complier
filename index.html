<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Compiler Lab | Sai Naveen</title>
    <style>
        :root {
            --bg: #000000;
            --insta-grad: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            --text: #fafafa;
            --card: #121212;
            --border: #262626;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .profile-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 50px;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .avatar-ring {
            width: 110px;
            height: 110px;
            background: var(--insta-grad);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3px;
        }
        .avatar-inner {
            background: var(--bg);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 800;
        }
        h1 { margin: 10px 0; font-size: 24px; font-weight: 700; }
        p { color: #8e8e8e; margin-bottom: 30px; font-size: 14px; line-height: 1.6; }
        .btn-launch {
            background: #0095f6;
            color: white;
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: opacity 0.2s ease;
            display: inline-block;
        }
