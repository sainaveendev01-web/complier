<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Compiler Lab | Sai Naveen</title>
    <style>
        :root {
            --bg: #0b0f1a;
            --card: #161b2a;
            --border: #2d334a;
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --grad: linear-gradient(135deg, #38bdf8 0%, #22d3ee 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
            padding: 20px;
        }

        .profile-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .avatar-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 24px;
            position: relative;
        }

        .avatar-ring {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--grad);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }

        .avatar-inner {
            width: 90%;
            height: 90%;
            background: var(--card);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 800;
            color: var(--accent);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .reg-no {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent);
            font-weight: 600;
            background: rgba(56, 189, 248, 0.1);
            padding: 4px 12px;
            border-radius: 999px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .description {
            color: var(--text-dim);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .btn-launch {
            display: block;
            background: var(--grad);
            color: #0b0f1a;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-launch:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(56, 189, 248, 0); }
            100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
        }

        footer {
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-card">
            <div class="avatar-container">
                <div class="avatar-ring">
                    <div class="avatar-inner">SN</div>
                </div>
            </div>

            <h1>Sai Naveen</h1>
            <div class="reg-no">RA2311003050059</div>

            <p class="description">
                Advanced Compiler Design Laboratory<br>
                Multi-Phase Simulation Environment
            </p>

            <a href="simulation.html" class="btn-launch">Launch Compiler Engine</a>
        </div>

        <footer>
            Department of Computer Science & Engineering
        </footer>
    </div>

</body>
</html>
